# Focus DE — remote viewing of a HEADLESS Sway session over VNC (wayvnc).
#
# Include this from your main Sway config (~/.config/sway/config):
#       include /absolute/path/to/FocusDE/scripts/sway-vnc.conf
#
# When NO monitor is attached, start Sway with the headless backend so it has
# something to render (a virtual output called HEADLESS-1 appears):
#
#       WLR_BACKENDS=headless WLR_LIBINPUT_NO_DEVICES=1 sway
#
# (scripts/sway-headless-vnc.sh does exactly that for you.)

# Resolution of the virtual screen you'll see over VNC.
output HEADLESS-1 resolution 1280x720 position 0,0

# Start the VNC server bound to localhost ONLY. Never expose VNC directly on the
# network — reach it through an SSH tunnel (see scripts/setup-remote.sh).
exec wayvnc 127.0.0.1 5900
